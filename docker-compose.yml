services:
  postgres:
    image: postgres:16-alpine
    container_name: ghtec-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ghtec
      POSTGRES_PASSWORD: ghtec123
      POSTGRES_DB: ghtec_propostas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghtec -d ghtec_propostas"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
