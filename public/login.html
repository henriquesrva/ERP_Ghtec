<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GHTec — Login</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--color-bg); }
    .login-wrap { width: 100%; max-width: 380px; padding: 16px; }
    .brand { text-align: center; margin-bottom: 32px; }
    .login-logo { height: 56px; width: auto; margin-bottom: 12px; }
    .brand-sub { font-size: 13px; color: var(--color-muted); margin-top: 2px; }
    .card { background: #fff; border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 28px 24px; box-shadow: var(--shadow); }
    .card h2 { margin: 0 0 20px; font-size: 16px; font-weight: 700; color: var(--color-text); }
    .field { margin-bottom: 14px; }
    .btn-login { width: 100%; padding: 11px; border-radius: var(--radius); border: none; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; background: var(--color-primary); color: #fff; transition: background 0.15s; margin-top: 4px; }
    .btn-login:hover:not(:disabled) { background: var(--color-primary-hover); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { font-size: 13px; padding: 8px 12px; border-radius: var(--radius); margin-bottom: 14px; background: var(--color-danger-bg); color: var(--color-danger); border: 1px solid var(--color-danger-border); display: none; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <img src="/assets/logoGHTEC.png" alt="GHTec" class="login-logo">
    <div class="brand-sub">Sistema de Propostas Comerciais</div>
  </div>
  <div class="card">
    <h2>Entrar</h2>
    <div id="msg" class="msg"></div>
    <form id="loginForm" novalidate>
      <div class="field">
        <label>Usuário</label>
        <input type="text" id="username" autocomplete="username" autocapitalize="none" />
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="password" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
    </form>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btnLogin');

    msg.style.display = 'none';
    if (!username || !password) {
      msg.textContent = 'Preencha usuário e senha.';
      msg.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Entrando…';
    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = '/';
      } else {
        msg.textContent = data.message || 'Erro ao fazer login.';
        msg.style.display = 'block';
      }
    } catch {
      msg.textContent = 'Erro de conexão com o servidor.';
      msg.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  });


  document.getElementById('username').focus();
</script>
</body>
</html>
