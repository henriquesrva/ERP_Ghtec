<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GHTec — Financeiro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --green: #2e7d32; --green-light: #43a047; --green-bg: #f1f8f1;
      --border: #c8d8c8; --text: #1f1f1f; --muted: #666;
      --danger: #c62828; --amber: #f57f17; --radius: 6px;
      --blue: #1565c0;
    }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; font-size: 14px; background: #f5f5f5; color: var(--text); }
    .nav { background: var(--green); display: flex; align-items: center; padding: 0 32px; flex-wrap: wrap; }
    .nav-brand { color: #fff; text-decoration: none; font-size: 17px; font-weight: 800; padding: 16px 20px 16px 0; margin-right: 12px; border-right: 1px solid rgba(255,255,255,0.25); }
    .nav-link { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 13px; font-weight: 600; padding: 19px 14px; border-bottom: 3px solid transparent; display: inline-block; transition: all 0.15s; }
    .nav-link:hover { color: #fff; border-bottom-color: rgba(255,255,255,0.5); }
    .nav-link.active { color: #fff; border-bottom-color: #fff; }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 2px; padding-right: 8px; }
    #navUserLabel { color: rgba(255,255,255,0.7); font-size: 12px; padding: 0 10px; border-left: 1px solid rgba(255,255,255,0.2); margin-left: 4px; white-space: nowrap; }
    .btn-logout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.85); padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit; font-weight: 600; margin-left: 4px; }
    .btn-logout:hover { background: rgba(255,255,255,0.2); }
    .page-bar { background: #1b5e20; padding: 10px 32px; }
    .page-bar h1 { margin: 0; font-size: 16px; font-weight: 700; color: #fff; }
    .container { max-width: 1200px; margin: 28px auto; padding: 0 16px 60px; display: flex; flex-direction: column; gap: 20px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    @media (max-width: 900px) { .kpi-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 560px) { .kpi-grid { grid-template-columns: 1fr; } }
    .kpi-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
    .kpi-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
    .kpi-value { font-size: 24px; font-weight: 800; line-height: 1; }
    .kpi-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .kpi-aberto   .kpi-value { color: var(--blue); }
    .kpi-atrasado .kpi-value { color: var(--danger); }
    .kpi-pago     .kpi-value { color: #2e7d32; }
    .kpi-vencendo .kpi-value { color: var(--amber); }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 760px) { .two-col { grid-template-columns: 1fr; } }
    .card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 22px; }
    .card-title { font-size: 12px; font-weight: 700; letter-spacing: 0.7px; color: var(--green); text-transform: uppercase; margin: 0 0 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .mini-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .mini-table th { text-align: left; color: var(--muted); font-weight: 700; padding: 4px 8px; border-bottom: 1px solid var(--border); }
    .mini-table td { padding: 7px 8px; border-bottom: 1px solid #f0f0f0; }
    .tag { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 11px; font-weight: 700; }
    .tag-danger { background: #ffebee; color: var(--danger); }
    .tag-warn   { background: #fff8e1; color: #e65100; }
    .empty-state { text-align: center; color: var(--muted); padding: 24px 0; font-size: 13px; }
    .chart-wrap { height: 220px; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: var(--radius); border: none; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; background: #eee; color: #444; }
    .btn:hover { background: #ddd; }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand">GHTec</a>
  <a href="/proposals.html" class="nav-link">Propostas</a>
  <a href="/kanban.html" class="nav-link">Kanban</a>
  <a href="/clients.html" class="nav-link">Clientes</a>
  <a href="/parts.html" class="nav-link">Peças</a>
  <a href="/stock.html" class="nav-link">Estoque</a>
  <a href="/fornecedores.html" class="nav-link">Fornecedores</a>
  <a href="/notas-recebidas.html" class="nav-link">Notas Recebidas</a>
  <a href="/contas-pagar.html" class="nav-link">Contas a Pagar</a>
  <a href="/financeiro.html" class="nav-link active">Financeiro</a>
  <div class="nav-right">
    <span id="navUserLabel"></span>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</nav>

<div class="page-bar"><h1>Painel Financeiro</h1></div>

<div class="container">

  <!-- KPIs -->
  <div class="kpi-grid">
    <div class="kpi-card kpi-aberto">
      <div class="kpi-label">Total em aberto</div>
      <div class="kpi-value" id="kpiAberto">—</div>
      <div class="kpi-sub">contas não vencidas</div>
    </div>
    <div class="kpi-card kpi-atrasado">
      <div class="kpi-label">Total atrasado</div>
      <div class="kpi-value" id="kpiAtrasado">—</div>
      <div class="kpi-sub">vencidas e não pagas</div>
    </div>
    <div class="kpi-card kpi-pago">
      <div class="kpi-label">Pago no mês</div>
      <div class="kpi-value" id="kpiPago">—</div>
      <div class="kpi-sub" id="kpiPagoMes"></div>
    </div>
    <div class="kpi-card kpi-vencendo">
      <div class="kpi-label">Vencendo em 7 dias</div>
      <div class="kpi-value" id="kpiVencendo7">—</div>
      <div class="kpi-sub" id="kpiVencendo7Sub"></div>
    </div>
  </div>

  <!-- Próximos vencimentos + Gráfico de categorias -->
  <div class="two-col">
    <div class="card">
      <div class="card-title">
        Próximos vencimentos
        <a href="/contas-pagar.html" class="btn">Ver todos</a>
      </div>
      <div id="proxVencimentos"></div>
    </div>

    <div class="card">
      <div class="card-title">Despesas por categoria</div>
      <div class="chart-wrap">
        <canvas id="categChart"></canvas>
      </div>
    </div>
  </div>

</div>

<script>
let chartInstance = null;

async function init() {
  const me = await fetch("/auth/me").then(r => r.json()).catch(() => null);
  if (!me) { location.href = "/login.html"; return; }
  document.getElementById("navUserLabel").textContent = me.nome;
  loadResumo();
}

async function loadResumo() {
  const data = await fetch("/contas-pagar/resumo").then(r => r.json()).catch(() => null);
  if (!data) return;

  const { totais, proxVencimentos, vencendo7dias, porCategoria } = data;

  document.getElementById("kpiAberto").textContent   = fmtMoeda(totais.total_aberto   || 0);
  document.getElementById("kpiAtrasado").textContent = fmtMoeda(totais.total_atrasado || 0);
  document.getElementById("kpiPago").textContent     = fmtMoeda(totais.total_pago_mes || 0);

  const agora = new Date();
  document.getElementById("kpiPagoMes").textContent =
    `${agora.toLocaleString("pt-BR", { month: "long" })} ${agora.getFullYear()}`;

  document.getElementById("kpiVencendo7").textContent   = fmtMoeda(vencendo7dias.total || 0);
  document.getElementById("kpiVencendo7Sub").textContent = `${vencendo7dias.n || 0} conta(s)`;

  // Próximos vencimentos
  const proxWrap = document.getElementById("proxVencimentos");
  if (!proxVencimentos.length) {
    proxWrap.innerHTML = '<div class="empty-state">Nenhum vencimento próximo.</div>';
  } else {
    proxWrap.innerHTML = `
      <table class="mini-table">
        <tr><th>Descrição</th><th>Fornecedor</th><th>Vencimento</th><th>Valor</th></tr>
        ${proxVencimentos.map(c => `
          <tr>
            <td>${c.descricao}</td>
            <td>${c.fornecedor_nome}</td>
            <td>
              ${fmtDate(c.data_vencimento)}
              ${c.atrasado ? '<span class="tag tag-danger" style="margin-left:4px">atrasado</span>' : ''}
            </td>
            <td style="font-weight:700;white-space:nowrap">${fmtMoeda(c.valor)}</td>
          </tr>`).join("")}
      </table>`;
  }

  // Gráfico de pizza por categoria
  if (chartInstance) chartInstance.destroy();
  const labels = porCategoria.map(c => c.categoria);
  const values = porCategoria.map(c => c.total);
  const colors = generateColors(labels.length);

  chartInstance = new Chart(document.getElementById("categChart"), {
    type: "doughnut",
    data: {
      labels,
      datasets: [{ data: values, backgroundColor: colors, borderWidth: 1 }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: "right", labels: { font: { size: 11 }, boxWidth: 12 } },
        tooltip: {
          callbacks: {
            label: ctx => ` ${fmtMoeda(ctx.parsed)}`,
          },
        },
      },
    },
  });
}

function generateColors(n) {
  const base = [
    "#2e7d32","#1565c0","#f57f17","#c62828","#6a1b9a",
    "#00838f","#558b2f","#4e342e","#37474f","#ad1457",
  ];
  const out = [];
  for (let i = 0; i < n; i++) out.push(base[i % base.length]);
  return out;
}

async function logout() {
  await fetch("/auth/logout", { method: "POST" });
  location.href = "/login.html";
}

function fmtDate(d) {
  if (!d) return "—";
  const [y, m, dd] = d.slice(0, 10).split("-");
  return `${dd}/${m}/${y}`;
}
function fmtMoeda(v) {
  if (v == null) return "—";
  return "R$ " + Number(v).toLocaleString("pt-BR", { minimumFractionDigits: 2 });
}

init();
</script>
</body>
</html>
