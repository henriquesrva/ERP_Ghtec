<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/styles.css">
  <title>GHTec — Responsáveis</title>
  <style>
/* Layout */
.split { display: grid; grid-template-columns: 360px 1fr; gap: 20px; align-items: start; }
    @media (max-width: 860px) { .split { grid-template-columns: 1fr; } }

    /* Card */
.card-title span { color: var(--amber); font-size: 11px; }

    /* Search + list */
    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-wrap input { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: var(--radius); font-size: 13px; font-family: inherit; }
    .search-wrap input:focus { outline: none; border-color: var(--green-light); box-shadow: 0 0 0 3px rgba(67,160,71,0.15); }

    .resp-list { max-height: 560px; overflow-y: auto; }
    .resp-item {
      padding: 10px 12px; border-radius: var(--radius); cursor: default;
      border: 1px solid transparent; margin-bottom: 4px; transition: all 0.12s;
    }
    .resp-item:hover { background: var(--green-bg); border-color: var(--border); }
    .ri-name { font-weight: 700; font-size: 13px; }
    .ri-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .empty-list { text-align: center; color: var(--muted); padding: 24px 0; font-size: 13px; }
    #listLoading { text-align: center; color: var(--muted); padding: 20px 0; font-size: 13px; }

    /* Form */
/* Buttons */
.btn-new { padding: 5px 12px; font-size: 12px; background: var(--green-bg); color: var(--green); border: 1px dashed var(--green-light); border-radius: var(--radius); cursor: pointer; font-weight: 700; font-family: inherit; transition: background 0.15s; }
    .btn-new:hover { background: #dcedc8; }

    /* Status message */
    .msg { font-size: 13px; padding: 8px 12px; border-radius: var(--radius); }
/* Delete button inside list item */
    .ri-actions { display: flex; align-items: center; justify-content: space-between; }
    .btn-del-resp {
      display: none; padding: 3px 8px; font-size: 11px; font-weight: 700; cursor: pointer;
      border: 1px solid #ef9a9a; border-radius: var(--radius); background: #fff; color: var(--danger);
      transition: background 0.15s;
    }
    .resp-item:hover .btn-del-resp { display: inline-block; }
    .btn-del-resp:hover { background: #ffebee; }

    /* Confirm overlay */
@media (max-width: 640px) {
}
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="/">
    <img src="/assets/logoGHTEC.png" alt="GHTec" class="app-logo">
  </a>
  <div class="nav-group" data-group="comercial">
    <button class="nav-group-btn">Comercial <span class="nav-arrow">&#9662;</span></button>
    <div class="nav-dropdown">
      <a href="/proposals.html" class="nav-dd-link">Propostas</a>
      <a href="/kanban.html" class="nav-dd-link">Kanban</a>
      <a href="/clients.html" class="nav-dd-link">Clientes</a>
      <a href="/objetos.html" class="nav-dd-link">Objetos e Condições</a>
    </div>
  </div>
  <div class="nav-group" data-group="operacional">
    <button class="nav-group-btn">Operacional <span class="nav-arrow">&#9662;</span></button>
    <div class="nav-dropdown">
      <a href="/parts.html" class="nav-dd-link">Peças</a>
      <a href="/stock.html" class="nav-dd-link">Estoque</a>
      <a href="/fornecedores.html" class="nav-dd-link">Fornecedores</a>
      <a href="/notas-recebidas.html" class="nav-dd-link">Notas Recebidas</a>
    </div>
  </div>
  <div class="nav-group" data-group="financeiro">
    <button class="nav-group-btn">Financeiro <span class="nav-arrow">&#9662;</span></button>
    <div class="nav-dropdown">
      <a href="/contas-pagar.html" class="nav-dd-link">Contas a Pagar</a>
      <a href="/financeiro.html" class="nav-dd-link">Financeiro</a>
    </div>
  </div>
  <div class="nav-right">
    <span id="navUserLabel"></span>
    <a href="/usuarios.html" class="nav-icon-link" title="Usuários e configurações">&#9881;</a>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</nav>
<div class="page-bar">
  <div>
    <h1>Responsáveis</h1>
    <div>Cadastro de responsáveis comerciais pelas propostas</div>
  </div>
</div>

<div class="container">
  <div class="split">

    <!-- ── Lista ── -->
    <div class="card">
      <div class="card-title">
        Responsáveis cadastrados
        <button class="btn-new" id="btnNew">+ Novo</button>
      </div>
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Buscar por nome ou cargo..." autocomplete="off" />
      </div>
      <div id="listLoading">Carregando...</div>
      <div class="resp-list" id="respList"></div>
    </div>

    <!-- ── Formulário ── -->
    <div class="card">
      <div class="card-title">
        <span id="formTitle">Novo Responsável</span>
      </div>

      <form id="respForm" novalidate>
        <div class="grid-2">
          <div class="field col-span-2">
            <label>Nome *</label>
            <input type="text" id="f_nome" placeholder="Nome completo do responsável" />
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label>Cargo</label>
            <input type="text" id="f_cargo" placeholder="Engenheiro Comercial" />
          </div>
          <div class="field">
            <label>Telefone</label>
            <input type="text" id="f_telefone" placeholder="(11) 99999-9999" />
          </div>
        </div>

        <div id="formMsg" style="display:none" class="msg"></div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="btnSubmit">Criar responsável</button>
          <button type="button" class="btn btn-ghost" id="btnCancel" style="display:none">Cancelar</button>
        </div>
      </form>
    </div>

  </div>
</div>

<script>
  // ─── State ──────────────────────────────────────────────────────────────────
  let allResp = [];

  // ─── Helpers ────────────────────────────────────────────────────────────────
  function v(id)      { return document.getElementById(id); }
  function val(id)    { return v(id).value.trim(); }
  function set(id, x) { v(id).value = x ?? ''; }

  function showMsg(type, text) {
    const el = v('formMsg');
    el.className = `msg ${type}`;
    el.textContent = text;
    el.style.display = 'block';
  }
  function hideMsg() { v('formMsg').style.display = 'none'; }

  // ─── Confirm dialog ────────────────────────────────────────────────────────
  function showConfirm(title, text, onConfirm) {
    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML = `
      <div class="confirm-box">
        <h3>${title}</h3>
        <p>${text}</p>
        <div class="confirm-actions">
          <button class="btn btn-ghost" id="_confirmCancel">Cancelar</button>
          <button class="btn btn-primary" id="_confirmOk" style="background:var(--danger)">Excluir</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#_confirmCancel').addEventListener('click', () => overlay.remove());
    overlay.querySelector('#_confirmOk').addEventListener('click', () => { overlay.remove(); onConfirm(); });
  }

  // ─── List rendering ────────────────────────────────────────────────────────
  function renderList(list) {
    const container = v('respList');
    v('listLoading').style.display = 'none';
    container.innerHTML = '';

    if (!list.length) {
      container.innerHTML = '<div class="empty-list">Nenhum responsável encontrado.</div>';
      return;
    }

    list.forEach(r => {
      const sub = [r.cargo, r.telefone].filter(Boolean).join(' · ');
      const div = document.createElement('div');
      div.className = 'resp-item';
      div.dataset.id = r.id;
      div.innerHTML = `
        <div class="ri-actions">
          <div>
            <div class="ri-name">${r.nome}</div>
            ${sub ? `<div class="ri-sub">${sub}</div>` : ''}
          </div>
          <button class="btn-del-resp" data-id="${r.id}" title="Excluir responsável">✕</button>
        </div>`;

      div.querySelector('.btn-del-resp').addEventListener('click', (e) => {
        e.stopPropagation();
        showConfirm(
          'Excluir responsável',
          `Deseja excluir <strong>${r.nome}</strong>? Esta ação não pode ser desfeita.`,
          () => deleteRespAction(r.id, r.nome)
        );
      });

      container.appendChild(div);
    });
  }

  async function deleteRespAction(id, nome) {
    try {
      const res  = await fetch(`/responsaveis/${id}`, { method: 'DELETE' });
      const data = await res.json();
      if (res.ok) {
        showMsg('success', `Responsável "${nome}" excluído com sucesso.`);
        await loadList(v('searchInput').value.trim());
      } else {
        showMsg('error', data.message || 'Erro ao excluir responsável.');
      }
    } catch {
      showMsg('error', 'Erro de conexão com o servidor.');
    }
  }

  // ─── Load / search ─────────────────────────────────────────────────────────
  async function loadList(q) {
    try {
      const url = q ? `/responsaveis/search?q=${encodeURIComponent(q)}` : '/responsaveis';
      const res = await fetch(url);
      allResp = await res.json();
      renderList(allResp);
    } catch {
      v('listLoading').textContent = 'Erro ao carregar.';
    }
  }

  let searchT;
  v('searchInput').addEventListener('input', e => {
    clearTimeout(searchT);
    searchT = setTimeout(() => loadList(e.target.value.trim()), 280);
  });

  // ─── Form reset ────────────────────────────────────────────────────────────
  function setCreateMode() {
    v('respForm').reset();
    v('formTitle').textContent  = 'Novo Responsável';
    v('btnSubmit').textContent  = 'Criar responsável';
    v('btnCancel').style.display = 'none';
    hideMsg();
  }

  v('btnNew').addEventListener('click', () => { setCreateMode(); v('f_nome').focus(); });
  v('btnCancel').addEventListener('click', setCreateMode);

  // ─── Form submit ───────────────────────────────────────────────────────────
  function collect() {
    return {
      nome:     val('f_nome')     || null,
      cargo:    val('f_cargo')    || null,
      telefone: val('f_telefone') || null,
    };
  }

  v('respForm').addEventListener('submit', async e => {
    e.preventDefault();
    hideMsg();

    if (!val('f_nome')) {
      v('f_nome').classList.add('error');
      showMsg('error', 'O campo Nome é obrigatório.');
      v('f_nome').focus();
      return;
    }
    v('f_nome').classList.remove('error');

    const btn = v('btnSubmit');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    try {
      const res  = await fetch('/responsaveis', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(collect()),
      });
      const data = await res.json();

      if (res.ok) {
        showMsg('success', 'Responsável criado com sucesso.');
        setCreateMode();
        await loadList(v('searchInput').value.trim());
      } else {
        showMsg('error', data.message || 'Erro ao salvar. Tente novamente.');
      }
    } catch {
      showMsg('error', 'Erro de conexão com o servidor.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Criar responsável';
    }
  });

  // ─── Init ──────────────────────────────────────────────────────────────────
  loadList();
  if (new URLSearchParams(location.search).get('new') === '1') {
    setCreateMode();
    v('f_nome').focus();
  }
</script>
<script src="/auth.js"></script>
</body>
</html>
