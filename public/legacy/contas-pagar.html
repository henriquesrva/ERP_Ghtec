<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/styles.css">
  <title>GHTec — Contas a Pagar</title>
  <style>
    /* ── Filtros ── */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 14px;
      padding: 12px 14px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
    }
    .filters select,
    .filters input {
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: var(--radius);
      font-size: 13px;
      font-family: inherit;
    }
    .filters select:focus,
    .filters input:focus { outline: none; border-color: var(--color-primary-light); }

    /* ── Tabela (cabeçalho neutro — tabela financeira) ── */
    th {
      text-align: left;
      color: var(--color-muted);
      font-size: 11px;
      font-weight: 700;
      padding: 7px 10px;
      border-bottom: 2px solid var(--color-border);
      white-space: nowrap;
      background: var(--color-bg);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    tr.row-atrasado td { background: #fff8f8; }
    tr.row-atrasado:hover td { background: #ffebee; }

    /* ── Modal de formulário ── */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 400;
      align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      width: 520px;
      max-width: 96vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }
    .modal-title {
      font-size: 15px; font-weight: 700;
      color: var(--color-primary);
      margin: 0 0 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--color-border);
    }

    /* ── Info box (detalhe da conta) ── */
    .info-box {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 16px;
      line-height: 1.9;
    }
    .info-box strong {
      display: inline-block;
      min-width: 120px;
      color: var(--color-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    /* ── Msg ── */
    .msg { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="/">
    <img src="/assets/logoGHTEC.png" alt="GHTec" class="app-logo">
  </a>
  <div class="nav-group" data-group="comercial">
    <button class="nav-group-btn">Comercial <span class="nav-arrow">&#9662;</span></button>
    <div class="nav-dropdown">
      <a href="/proposals.html" class="nav-dd-link">Propostas</a>
      <a href="/kanban.html" class="nav-dd-link">Kanban</a>
      <a href="/clients.html" class="nav-dd-link">Clientes</a>
      <a href="/objetos.html" class="nav-dd-link">Objetos e Condições</a>
    </div>
  </div>
  <div class="nav-group" data-group="operacional">
    <button class="nav-group-btn">Operacional <span class="nav-arrow">&#9662;</span></button>
    <div class="nav-dropdown">
      <a href="/parts.html" class="nav-dd-link">Peças</a>
      <a href="/stock.html" class="nav-dd-link">Estoque</a>
      <a href="/fornecedores.html" class="nav-dd-link">Fornecedores</a>
      <a href="/notas-recebidas.html" class="nav-dd-link">Notas Recebidas</a>
    </div>
  </div>
  <div class="nav-group" data-group="financeiro">
    <button class="nav-group-btn">Financeiro <span class="nav-arrow">&#9662;</span></button>
    <div class="nav-dropdown">
      <a href="/contas-pagar.html" class="nav-dd-link">Contas a Pagar</a>
      <a href="/financeiro.html" class="nav-dd-link">Financeiro</a>
    </div>
  </div>
  <div class="nav-right">
    <span id="navUserLabel"></span>
    <a href="/usuarios.html" class="nav-icon-link" title="Usuários e configurações">&#9881;</a>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</nav>

<div class="page-bar">
  <div>
    <h1>Contas a Pagar</h1>
    <div>Gestão de pagamentos e obrigações financeiras</div>
  </div>
  <a href="/financeiro.html" class="btn btn-sm" style="background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);">← Painel Financeiro</a>
</div>

<div class="container">
  <div class="card">
    <div class="card-header">
      <span class="section-title">Contas a pagar</span>
      <button class="btn btn-primary" onclick="openNovaContaModal()">+ Nova conta</button>
    </div>

    <div class="filters">
      <select id="filtroStatus" onchange="loadList()">
        <option value="">Todos os status</option>
        <option value="em_aberto">Em aberto</option>
        <option value="atrasado">Atrasado</option>
        <option value="pago">Pago</option>
        <option value="cancelado">Cancelado</option>
      </select>
      <select id="filtroFornecedor" onchange="loadList()">
        <option value="">Todos os fornecedores</option>
      </select>
      <select id="filtroCategoria" onchange="loadList()">
        <option value="">Todas as categorias</option>
      </select>
      <select id="filtroForma" onchange="loadList()">
        <option value="">Todas as formas</option>
        <option value="pix">PIX</option>
        <option value="boleto">Boleto</option>
        <option value="transferencia">Transferência</option>
        <option value="cartao">Cartão</option>
        <option value="dinheiro">Dinheiro</option>
        <option value="outro">Outro</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="clearFilters()">Limpar</button>
    </div>

    <div id="tableWrap"><div class="empty-state">Carregando...</div></div>
  </div>
</div>

<!-- Modal: Dar baixa -->
<div class="modal-bg" id="baixaModalBg" onclick="bgClick('baixaModalBg',event)">
  <div class="modal">
    <div class="modal-title">Dar baixa na conta</div>
    <div id="baixaInfo" class="info-box"></div>
    <div id="baixaMsg"></div>
    <form id="baixaForm" onsubmit="submitBaixa(event)" enctype="multipart/form-data">
      <div class="grid-2">
        <div class="field">
          <label>Data do pagamento *</label>
          <input type="date" name="data_pagamento" required />
        </div>
        <div class="field">
          <label>Valor pago (R$) *</label>
          <input type="number" name="valor_pago" step="0.01" min="0.01" required id="valorPagoInput" />
        </div>
        <div class="field col-span-2">
          <label>Forma de pagamento</label>
          <select name="forma_pagamento">
            <option value="">— Selecione —</option>
            <option value="pix">PIX</option>
            <option value="boleto">Boleto</option>
            <option value="transferencia">Transferência</option>
            <option value="cartao">Cartão</option>
            <option value="dinheiro">Dinheiro</option>
            <option value="outro">Outro</option>
          </select>
        </div>
        <div class="field col-span-2">
          <label>Comprovante (imagem ou PDF)</label>
          <input type="file" name="comprovante_pagamento" accept=".jpg,.jpeg,.png,.pdf,.webp" />
        </div>
        <div class="field col-span-2">
          <label>Observações</label>
          <input type="text" name="observacoes" />
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="btnConfirmarBaixa">Confirmar pagamento</button>
        <button type="button" class="btn btn-ghost" onclick="closeModal('baixaModalBg')">Cancelar</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: Cancelar conta -->
<div class="modal-bg" id="cancelModalBg" onclick="bgClick('cancelModalBg',event)">
  <div class="modal" style="width:420px">
    <div class="modal-title">Cancelar conta a pagar</div>
    <div id="cancelInfo" class="info-box"></div>
    <div id="cancelMsg"></div>
    <div class="field" style="margin-bottom:16px">
      <label>Motivo do cancelamento</label>
      <input type="text" id="cancelMotivo" placeholder="Opcional" />
    </div>
    <div class="form-actions">
      <button class="btn btn-danger" onclick="confirmarCancelamento()">Confirmar cancelamento</button>
      <button class="btn btn-ghost" onclick="closeModal('cancelModalBg')">Voltar</button>
    </div>
  </div>
</div>

<!-- Modal: Nova conta avulsa -->
<div class="modal-bg" id="novaContaModalBg" onclick="bgClick('novaContaModalBg',event)">
  <div class="modal" style="width:620px">
    <div class="modal-title">Nova Conta a Pagar</div>
    <div id="novaContaMsg"></div>
    <form id="novaContaForm" onsubmit="submitNovaConta(event)">
      <div class="grid-2">
        <div class="field col-span-2">
          <label>Fornecedor *</label>
          <select name="fornecedor_id" id="novaContaFornecedor" required>
            <option value="">— Selecione —</option>
          </select>
        </div>
        <div class="field col-span-2">
          <label>Descrição *</label>
          <input type="text" name="descricao" required />
        </div>
        <div class="field">
          <label>Valor (R$) *</label>
          <input type="number" name="valor" step="0.01" min="0.01" required />
        </div>
        <div class="field">
          <label>Categoria</label>
          <select name="categoria_despesa_id" id="novaContaCategoria">
            <option value="">— Selecione —</option>
          </select>
        </div>
        <div class="field">
          <label>Data de emissão *</label>
          <input type="date" name="data_emissao" required />
        </div>
        <div class="field">
          <label>Data de vencimento *</label>
          <input type="date" name="data_vencimento" required />
        </div>
        <div class="field col-span-2">
          <label>Forma de pagamento</label>
          <select name="forma_pagamento">
            <option value="">— Selecione —</option>
            <option value="pix">PIX</option>
            <option value="boleto">Boleto</option>
            <option value="transferencia">Transferência</option>
            <option value="cartao">Cartão</option>
            <option value="dinheiro">Dinheiro</option>
            <option value="outro">Outro</option>
          </select>
        </div>
        <div class="field col-span-2">
          <label>Observações</label>
          <input type="text" name="observacoes" />
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="btnSaveNovaConta">Salvar</button>
        <button type="button" class="btn btn-ghost" onclick="closeModal('novaContaModalBg')">Cancelar</button>
      </div>
    </form>
  </div>
</div>

<script>
let userRole     = null;
let currentContaId = null;
let currentConta   = null;

async function init() {
  const me = await fetch("/auth/me").then(r => r.json()).catch(() => null);
  if (!me) { location.href = "/login.html"; return; }
  document.getElementById("navUserLabel").textContent = me.nome;
  userRole = me.role;

  const [fornecedores, categorias] = await Promise.all([
    fetch("/fornecedores").then(r => r.json()),
    fetch("/categorias-despesa").then(r => r.json()),
  ]);

  const selF = document.getElementById("filtroFornecedor");
  const selFN = document.getElementById("novaContaFornecedor");
  fornecedores.forEach(f => {
    const opt = `<option value="${f.id}">${f.razao_social}</option>`;
    selF.insertAdjacentHTML("beforeend", opt);
    selFN.insertAdjacentHTML("beforeend", opt);
  });

  const selC  = document.getElementById("filtroCategoria");
  const selCN = document.getElementById("novaContaCategoria");
  categorias.forEach(c => {
    const opt = `<option value="${c.id}">${c.nome}</option>`;
    selC.insertAdjacentHTML("beforeend", opt);
    selCN.insertAdjacentHTML("beforeend", opt);
  });

  loadList();
}

async function loadList() {
  const status  = document.getElementById("filtroStatus").value;
  const fid     = document.getElementById("filtroFornecedor").value;
  const catId   = document.getElementById("filtroCategoria").value;
  const forma   = document.getElementById("filtroForma").value;
  const qs = new URLSearchParams({ limit: "200" });
  if (status) qs.set("status", status);
  if (fid)    qs.set("fornecedor_id", fid);
  if (catId)  qs.set("categoria_id", catId);
  if (forma)  qs.set("forma_pagamento", forma);

  const data = await fetch(`/contas-pagar?${qs}`).then(r => r.json()).catch(() => []);
  const wrap = document.getElementById("tableWrap");

  if (!data.length) {
    wrap.innerHTML = '<div class="empty-state">Nenhuma conta encontrada.</div>';
    return;
  }

  wrap.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Descrição</th>
          <th>Fornecedor</th>
          <th>Vencimento</th>
          <th>Valor</th>
          <th>Parcela</th>
          <th>Forma pgto</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(c => `
          <tr class="${c.atrasado ? 'row-atrasado' : ''}">
            <td><div style="font-weight:700">${c.descricao}</div>${c.nota_recebida_id ? `<div style="font-size:11px;color:var(--muted)">NF ${c.numero_nota || 's/n'}</div>` : ''}</td>
            <td>${c.fornecedor_nome}</td>
            <td style="white-space:nowrap">${fmtDate(c.data_vencimento)}</td>
            <td style="font-weight:700;white-space:nowrap">${fmtMoeda(c.valor)}</td>
            <td style="text-align:center">${c.parcela_numero ? c.parcela_numero + '/' + c.parcela_total : '—'}</td>
            <td>${c.forma_pagamento || '—'}</td>
            <td><span class="tag ${tagStatus(c.status, c.atrasado)}">${labelStatus(c.status, c.atrasado)}</span></td>
            <td style="white-space:nowrap">
              ${(c.status === 'em_aberto' || c.atrasado) ? `<button class="btn btn-amber btn-sm" onclick="openBaixa(${c.id})">Dar baixa</button>` : ''}
              ${c.status === 'pago' && c.comprovante_pagamento ? `<a class="btn btn-ghost btn-sm" href="/files/comprovantes/${c.comprovante_pagamento.replace('comprovantes/','')}" target="_blank">Comprovante</a>` : ''}
              ${(c.status !== 'cancelado' && c.status !== 'pago' && (userRole === 'admin' || userRole === 'financeiro')) ? `<button class="btn btn-ghost btn-sm" style="margin-left:4px" onclick="openCancelamento(${c.id})">Cancelar</button>` : ''}
            </td>
          </tr>`).join("")}
      </tbody>
    </table>`;
}

function clearFilters() {
  ["filtroStatus","filtroFornecedor","filtroCategoria","filtroForma"].forEach(id => {
    document.getElementById(id).value = "";
  });
  loadList();
}

// ── Baixa ─────────────────────────────────────────────────────────────────────
async function openBaixa(id) {
  currentContaId = id;
  const c = await fetch(`/contas-pagar/${id}`).then(r => r.json());
  currentConta = c;
  document.getElementById("baixaInfo").innerHTML = `
    <strong>Descrição</strong>${c.descricao}<br>
    <strong>Fornecedor</strong>${c.fornecedor_nome}<br>
    <strong>Vencimento</strong>${fmtDate(c.data_vencimento)}<br>
    <strong>Valor</strong>${fmtMoeda(c.valor)}
  `;
  document.getElementById("baixaMsg").innerHTML = "";
  document.getElementById("baixaForm").reset();
  document.getElementById("valorPagoInput").value = c.valor;
  document.getElementById("baixaForm").querySelector("input[name='data_pagamento']").value = new Date().toISOString().slice(0, 10);
  document.getElementById("baixaModalBg").classList.add("open");
}

async function submitBaixa(e) {
  e.preventDefault();
  const btn  = document.getElementById("btnConfirmarBaixa");
  const form = document.getElementById("baixaForm");
  btn.disabled = true;

  const fd = new FormData(form);
  const resp = await fetch(`/contas-pagar/${currentContaId}/baixar`, { method: "POST", body: fd });
  const json = await resp.json();
  btn.disabled = false;

  if (json.success) {
    closeModal("baixaModalBg");
    loadList();
    showToast("Baixa registrada com sucesso.");
  } else {
    document.getElementById("baixaMsg").innerHTML = `<div class="msg msg-err">${json.message}</div>`;
  }
}

// ── Cancelamento ──────────────────────────────────────────────────────────────
async function openCancelamento(id) {
  currentContaId = id;
  const c = await fetch(`/contas-pagar/${id}`).then(r => r.json());
  document.getElementById("cancelInfo").innerHTML = `
    <strong>Descrição</strong>${c.descricao}<br>
    <strong>Fornecedor</strong>${c.fornecedor_nome}<br>
    <strong>Valor</strong>${fmtMoeda(c.valor)}
  `;
  document.getElementById("cancelMsg").innerHTML = "";
  document.getElementById("cancelMotivo").value = "";
  document.getElementById("cancelModalBg").classList.add("open");
}

async function confirmarCancelamento() {
  const motivo = document.getElementById("cancelMotivo").value.trim();
  const resp = await fetch(`/contas-pagar/${currentContaId}/cancelar`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ motivo }),
  });
  const json = await resp.json();
  if (json.success) { closeModal("cancelModalBg"); loadList(); showToast("Conta cancelada."); }
  else document.getElementById("cancelMsg").innerHTML = `<div class="msg msg-err">${json.message}</div>`;
}

// ── Nova conta avulsa ─────────────────────────────────────────────────────────
function openNovaContaModal() {
  document.getElementById("novaContaForm").reset();
  document.getElementById("novaContaMsg").innerHTML = "";
  const hoje = new Date().toISOString().slice(0, 10);
  document.getElementById("novaContaForm").querySelector("input[name='data_emissao']").value = hoje;
  document.getElementById("novaContaModalBg").classList.add("open");
}

async function submitNovaConta(e) {
  e.preventDefault();
  const btn  = document.getElementById("btnSaveNovaConta");
  const form = document.getElementById("novaContaForm");
  const data = Object.fromEntries(new FormData(form));
  btn.disabled = true;

  const resp = await fetch("/contas-pagar", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data),
  });
  const json = await resp.json();
  btn.disabled = false;

  if (json.success) { closeModal("novaContaModalBg"); loadList(); showToast("Conta criada com sucesso."); }
  else document.getElementById("novaContaMsg").innerHTML = `<div class="msg msg-err">${json.message}</div>`;
}

function closeModal(id)        { document.getElementById(id).classList.remove("open"); }
function bgClick(modalId, e)   { if (e.target === document.getElementById(modalId)) closeModal(modalId); }

async function logout() {
  await fetch("/auth/logout", { method: "POST" });
  location.href = "/login.html";
}

function fmtDate(d) {
  if (!d) return "—";
  const [y, m, dd] = d.slice(0, 10).split("-");
  return `${dd}/${m}/${y}`;
}
function fmtMoeda(v) {
  if (v == null) return "—";
  return "R$ " + Number(v).toLocaleString("pt-BR", { minimumFractionDigits: 2 });
}
function tagStatus(s, a) { return a ? "tag-danger" : s === "pago" ? "tag-ok" : s === "cancelado" ? "tag-muted" : "tag-warn"; }
function labelStatus(s, a) { return a ? "atrasado" : { em_aberto: "em aberto", pago: "pago", cancelado: "cancelado" }[s] || s; }

function showToast(msg, ok = true) {
  const t = document.createElement("div");
  t.className = "toast " + (ok ? "success" : "error");
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = "0"; t.style.transition = "opacity 0.4s"; setTimeout(() => t.remove(), 400); }, 3000);
}

init();
</script>
</body>
</html>
